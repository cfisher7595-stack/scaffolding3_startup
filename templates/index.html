<!DOCTYPE html>
<html>

<head>
    <title>Gutenberg Text Cleaner</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        input {
            width: 400px;
            padding: 10px;
        }

        button {
            padding: 10px;
        }

        #results {
            margin-top: 20px;
        }

        .loading {
            color: blue;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <h1>Gutenberg Text Cleaner</h1>

    <input id="urlInput" placeholder="Enter Gutenberg URL">
    <button onclick="submitForm()">Submit</button>

    <p id="loading" class="loading"></p>

    <div id="results"></div>

    <script>
        async function submitForm() {
            const url = document.getElementById("urlInput").value;
            const loading = document.getElementById("loading");
            const results = document.getElementById("results");

            loading.innerText = "Loading...";
            results.innerHTML = "";

            try {
                const response = await fetch('/api/clean', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                loading.innerText = "";

                if (data.success) {
                    results.innerHTML = `
                <h3>Summary</h3>
                <p>${data.summary}</p>

                <h3>Statistics</h3>
                <pre>${JSON.stringify(data.statistics, null, 2)}</pre>

                <h3>Cleaned Text (First 500 chars)</h3>
                <p>${data.cleaned_text}</p>
            `;
                } else {
                    results.innerHTML = `<p class="error">${data.error}</p>`;
                }

            } catch (err) {
                loading.innerText = "";
                results.innerHTML = `<p class="error">Request failed</p>`;
            }
        }
    </script>

</body>

</html>
